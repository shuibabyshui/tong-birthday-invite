<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tong 的 6 岁生日派对邀请！</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&family=Bubblegum+Sans&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #FF6B9D;
      --secondary: #C44569;
      --accent: #FFD93D;
      --sky: #6C5CE7;
      --cloud: #A29BFE;
      --white: #FFFFFF;
      --dark: #2D3436;
    }

    body {
      font-family: 'Noto Sans SC', 'Bubblegum Sans', sans-serif;
      background: linear-gradient(180deg, var(--sky) 0%, var(--cloud) 50%, var(--white) 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .card {
      background: var(--white);
      border-radius: 30px;
      padding: 40px 30px;
      box-shadow: 0 20px 60px rgba(108, 92, 231, 0.3);
      animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    @keyframes bounceIn {
      0% { transform: scale(0.3); opacity: 0; }
      50% { transform: scale(1.05); }
      70% { transform: scale(0.9); }
      100% { transform: scale(1); opacity: 1; }
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .age-badge {
      display: inline-block;
      background: var(--primary);
      color: var(--white);
      font-size: 48px;
      font-weight: 700;
      width: 100px;
      height: 100px;
      line-height: 100px;
      border-radius: 50%;
      box-shadow: 0 10px 30px rgba(255, 107, 157, 0.5);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    h1 {
      color: var(--secondary);
      font-size: 32px;
      margin: 20px 0 10px;
    }

    .subtitle {
      color: #636E72;
      font-size: 16px;
    }

    .party-info {
      background: linear-gradient(135deg, #FFEAA7 0%, var(--accent) 100%);
      border-radius: 20px;
      padding: 20px;
      margin: 20px 0;
    }

    .party-info h3 {
      color: var(--secondary);
      font-size: 14px;
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      font-size: 15px;
      color: var(--dark);
    }

    .info-item:last-child {
      margin-bottom: 0;
    }

    .info-icon {
      font-size: 20px;
    }

    .rsvp-form {
      margin-top: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: var(--secondary);
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 14px;
    }

    input, select, textarea {
      width: 100%;
      padding: 15px 20px;
      border: 3px solid #DFE6E9;
      border-radius: 15px;
      font-size: 16px;
      font-family: inherit;
      transition: all 0.3s;
      background: var(--white);
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(255, 107, 157, 0.2);
    }

    textarea {
      resize: none;
      height: 80px;
    }

    .btn {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 15px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      color: var(--white);
      box-shadow: 0 10px 30px rgba(255, 107, 157, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(255, 107, 157, 0.5);
    }

    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      top: -10px;
      animation: fall 3s linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
      }
    }

    .success-message {
      display: none;
      text-align: center;
      padding: 40px;
    }

    .success-message.active {
      display: block;
    }

    .success-icon {
      font-size: 60px;
      animation: bounce 0.5s;
    }

    @keyframes bounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }

    .success-message h2 {
      color: var(--secondary);
      margin: 20px 0;
    }

    .guest-count {
      text-align: center;
      margin-top: 20px;
      padding: 15px;
      background: #F8F9FA;
      border-radius: 15px;
      font-size: 14px;
      color: #636E72;
    }

    .guest-count span {
      color: var(--primary);
      font-weight: 700;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <div class="age-badge">6</div>
        <h1>🎉 Tong 的生日派对 🎉</h1>
        <p class="subtitle">誠摯邀請您參加</p>
      </div>

      <div class="party-info">
        <h3>📋 派對詳情</h3>
        <div class="info-item">
          <span class="info-icon">📅</span>
          <span><strong>2026年6月6日</strong> 週六</span>
        </div>
        <div class="info-item">
          <span class="info-icon">⏰</span>
          <span><strong>15:00 - 18:00</strong></span>
        </div>
        <div class="info-item">
          <span class="info-icon">📍</span>
          <span><strong>Altitude Trampoline Park</strong><br>147 Great Mall Dr, Milpitas, CA</span>
        </div>
      </div>

      <form class="rsvp-form" id="rsvpForm">
        <div class="form-group">
          <label>您的名字 👤</label>
          <input type="text" name="name" required placeholder="請輸入您的名字">
        </div>

        <div class="form-group">
          <label>能否參加？🤸</label>
          <select name="attending" required>
            <option value="">請選擇...</option>
            <option value="yes">✅ 會去！期待見面</option>
            <option value="no">❌ 抱歉無法參加</option>
          </select>
        </div>

        <div class="form-group">
          <label>參加人數 👨‍👩‍👧‍👦</label>
          <input type="number" name="count" value="1" min="1" max="10" required>
        </div>

        <div class="form-group">
          <label>備註（食物過敏、祝福語等）💬</label>
          <textarea name="notes" placeholder="有任何要告訴我們的嗎？"></textarea>
        </div>

        <button type="submit" class="btn btn-primary">✨ 發送確認 ✨</button>
      </form>

      <div class="success-message" id="successMessage">
        <div class="success-icon">🎊</div>
        <h2>感謝您的回覆！</h2>
        <p>期待派對上見到您～</p>
      </div>

      <div class="guest-count">
        目前 <span id="guestCount">0</span> 位嘉賓已確認
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('rsvpForm');
    const successMessage = document.getElementById('successMessage');
    const guestCount = document.getElementById('guestCount');

    // Load existing responses
    function loadResponses() {
      const responses = JSON.parse(localStorage.getItem('tong_birthday_rsvp') || '[]');
      const totalGuests = responses.filter(r => r.attending === 'yes').reduce((sum, r) => sum + parseInt(r.count), 0);
      guestCount.textContent = totalGuests;
      return responses;
    }

    // Save response
    function saveResponse(data) {
      const responses = loadResponses();
      responses.push({
        ...data,
        timestamp: new Date().toISOString()
      });
      localStorage.setItem('tong_birthday_rsvp', JSON.stringify(responses));
    }

    // Confetti animation
    function createConfetti() {
      const colors = ['#FF6B9D', '#C44569', '#FFD93D', '#6C5CE7', '#A29BFE'];
      for (let i = 0; i < 50; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * 100 + 'vw';
        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
        confetti.style.animationDelay = Math.random() * 0.5 + 's';
        document.body.appendChild(confetti);
      }
    }

    // Form submission
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const formData = new FormData(form);
      const data = Object.fromEntries(formData);

      // Save to localStorage
      saveResponse(data);

      // Show success
      form.style.display = 'none';
      successMessage.classList.add('active');

      // Update count
      loadResponses();

      // Confetti!
      createConfetti();
    });

    // Initial load
    loadResponses();
  </script>
</body>
</html>
